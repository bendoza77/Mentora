<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Mentora AI — AI-Powered Exam Prep for Georgian Students</title>
    <meta name="description" content="Mentora AI helps Georgian students ace national exams with AI-powered math tutoring, step-by-step solutions, personalized practice, and realistic exam simulations." />
    <meta name="keywords" content="mentora, mentora ai, georgian exam prep, national exam, მენტორა, გამოცდა, მათემატიკა, AI tutor, exam simulation, georgian math" />
    <meta name="author" content="Mentora AI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mentora.com.ge/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mentora.com.ge/" />
    <meta property="og:site_name" content="Mentora AI" />
    <meta property="og:title" content="Mentora AI — AI-Powered Exam Prep for Georgian Students" />
    <meta property="og:description" content="Ace your Georgian national exams with AI-powered tutoring, personalized practice, and realistic exam simulations. Used by top-scoring students." />
    <meta property="og:image" content="https://mentora.com.ge/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Mentora AI — AI-Powered Exam Preparation" />
    <meta property="og:locale" content="ka_GE" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mentora_ai" />
    <meta name="twitter:creator" content="@mentora_ai" />
    <meta name="twitter:title" content="Mentora AI — AI-Powered Exam Prep for Georgian Students" />
    <meta name="twitter:description" content="Ace your Georgian national exams with AI-powered tutoring, personalized practice, and realistic exam simulations." />
    <meta name="twitter:image" content="https://mentora.com.ge/og-image.png" />
    <meta name="twitter:image:alt" content="Mentora AI — AI-Powered Exam Preparation" />

    <!-- PWA / App -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mentora AI" />
    <meta name="application-name" content="Mentora AI" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Mentora AI",
      "url": "https://mentora.com.ge",
      "logo": "https://mentora.com.ge/favicon.svg",
      "description": "AI-powered exam preparation platform for Georgian national exams.",
      "foundingDate": "2024",
      "founders": [
        { "@type": "Person", "name": "Gabriel Jobava" },
        { "@type": "Person", "name": "Lile Jobava" }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "GE"
      },
      "sameAs": [
        "https://twitter.com/mentora_ai",
        "https://linkedin.com/company/mentora-ai"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "hello@mentora.com.ge"
      }
    }
    </script>

    <!-- Structured Data — WebSite with Sitelinks Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Mentora AI",
      "url": "https://mentora.com.ge",
      "description": "AI-powered exam preparation for Georgian students",
      "inLanguage": ["ka", "en"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://mentora.com.ge/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mentora AI",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "url": "https://mentora.com.ge",
      "description": "AI-powered math tutoring and exam simulation platform for Georgian national exam preparation.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free Plan",
          "price": "0",
          "priceCurrency": "GEL"
        },
        {
          "@type": "Offer",
          "name": "Pro Plan",
          "price": "19",
          "priceCurrency": "GEL",
          "billingPeriod": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Premium Plan",
          "price": "35",
          "priceCurrency": "GEL",
          "billingPeriod": "P1M"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "300",
        "bestRating": "5"
      }
    }
    </script>

    <!-- DNS prefetch speeds up font domain lookup before preconnect kicks in -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
